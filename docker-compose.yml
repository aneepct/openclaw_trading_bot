services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trading_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/db
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000}
    container_name: trading_frontend
    restart: unless-stopped
    ports:
      - "3006:80"
    depends_on:
      backend:
        condition: service_healthy

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: trading_openclaw
    user: "0:0"
    restart: unless-stopped
    ports:
      - "18789:18789"
    volumes:
      - ./openclaw-home:/root/.openclaw
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENCLAW_GATEWAY_BIND=lan
    command: >
      sh -lc "mkdir -p /root/.openclaw/workspace &&
      printf '%s' '{\"gateway\":{\"mode\":\"local\",\"bind\":\"lan\"},\"agents\":{\"defaults\":{\"workspace\":\"/root/.openclaw/workspace\"}}}' > /root/.openclaw/openclaw.json &&
      openclaw gateway --port 18789 --allow-unconfigured"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data: